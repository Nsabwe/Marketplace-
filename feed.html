<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OurMarket - Professional Marketplace Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

/* ============================================
   MARKETFLOW PRO CSS
   COLOR PALETTE: WHITE | ORANGE | GRAY
   PROFESSIONAL | RESPONSIVE | MODERN
   ============================================ */

/* ---------- CSS RESET & BASE ---------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: #F9FAFB;  /* soft gray background */
  color: #111827;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ---------- DESIGN SYSTEM (WHITE/ORANGE/GRAY) ---------- */
:root {
  /* Primary Orange Palette */
  --orange-50: #fff7ed;
  --orange-100: #ffedd5;
  --orange-200: #fed7aa;
  --orange-300: #fdba74;
  --orange-400: #fb923c;
  --orange-500: #f97316;
  --orange-600: #ea580c;
  --orange-700: #c2410c;
  --orange-800: #9a3412;
  
  /* Neutral Gray Scale */
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  
  /* Pure White / Off White */
  --white: #ffffff;
  --white-off: #fefefe;
  
  /* Semantic accents (stay within orange/gray family) */
  --success-bg: #f0fdf4;
  --success-text: #15803d;
  --danger-bg: #fef2f2;
  --danger-text: #b91c1c;
  --warning-bg: #fffbeb;
  --warning-text: #b45309;
  
  /* Shadows — soft, modern, depth */
  --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.03);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.06), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
  --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
  --shadow-orange-glow: 0 0 0 3px rgba(249, 115, 22, 0.12);
  
  /* Border Radius — harmonious rounding */
  --radius-xs: 6px;
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --radius-2xl: 36px;
  --radius-full: 9999px;
  
  /* Layout constants */
  --sidebar-width: 280px;
  --sidebar-width-mobile: 260px;
  
  /* Transitions */
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
  
  /* Typography */
  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;
}

/* ---------- TYPOGRAPHY REFINEMENTS ---------- */
h1, h2, h3, h4, h5, h6 {
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.3;
}

h1 { font-size: var(--text-3xl); font-weight: 800; }
h2 { font-size: var(--text-2xl); font-weight: 700; }
h3 { font-size: var(--text-xl); font-weight: 600; }

/* ---------- CUSTOM SCROLLBAR (PROFESSIONAL) ---------- */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}
::-webkit-scrollbar-track {
  background: var(--gray-100);
  border-radius: var(--radius-full);
}
::-webkit-scrollbar-thumb {
  background: var(--gray-300);
  border-radius: var(--radius-full);
}
::-webkit-scrollbar-thumb:hover {
  background: var(--orange-400);
}

::selection {
  background: var(--orange-100);
  color: var(--orange-800);
}

/* ---------- SIDEBAR (WHITE + ORANGE ACCENTS) ---------- */
.sidebar {
  width: var(--sidebar-width);
  background: var(--white);
  border-right: 1px solid var(--gray-200);
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  padding: 28px 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  z-index: 1000;
  transition: transform var(--transition-slow);
  overflow-y: auto;
  box-shadow: var(--shadow-sm);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 40px;
  padding: 0 8px;
}

.brand-logo {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--orange-500) 0%, var(--orange-600) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: white;
  box-shadow: 0 6px 12px -6px rgba(249,115,22,0.3);
}

.brand h2 {
  font-size: 1.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--gray-800) 0%, var(--gray-600) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
}

/* Navigation Links */
.nav {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}

.nav-link {
  text-decoration: none;
  color: var(--gray-600);
  padding: 14px 18px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all var(--transition-fast);
  font-weight: 500;
  font-size: var(--text-sm);
}

.nav-link i {
  width: 22px;
  font-size: 18px;
  transition: transform var(--transition-fast);
}

.nav-link:hover {
  background: var(--orange-50);
  color: var(--orange-600);
  transform: translateX(4px);
}
.nav-link:hover i {
  transform: scale(1.08);
  color: var(--orange-500);
}

.nav-link.active {
  background: var(--orange-50);
  color: var(--orange-700);
  border-left: 3px solid var(--orange-500);
  font-weight: 600;
}

/* Logout Button */
.logout-btn {
  border: none;
  padding: 14px 18px;
  border-radius: var(--radius-md);
  background: var(--gray-50);
  color: var(--gray-700);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all var(--transition-fast);
  width: 100%;
  margin-top: 20px;
  font-size: var(--text-sm);
}
.logout-btn:hover {
  background: #fee2e2;
  color: #dc2626;
  transform: translateY(-2px);
}

/* ---------- MAIN CONTENT AREA ---------- */
.main {
  margin-left: var(--sidebar-width);
  width: calc(100% - var(--sidebar-width));
  padding: 32px 40px;
  min-height: 100vh;
  transition: margin var(--transition-slow);
}

/* ---------- TOPBAR (Clean, Airy) ---------- */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 24px;
  margin-bottom: 36px;
}

.welcome h1 {
  font-size: var(--text-3xl);
  font-weight: 800;
  background: linear-gradient(135deg, var(--gray-800) 0%, var(--gray-600) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.welcome p {
  color: var(--gray-500);
  font-size: var(--text-sm);
  margin-top: 6px;
}

/* Search Box */
.search-box {
  position: relative;
  min-width: 280px;
}
.search-box i {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gray-400);
  font-size: 15px;
}
.search-box input {
  width: 100%;
  padding: 12px 16px 12px 44px;
  border: 1px solid var(--gray-200);
  border-radius: 48px;
  background: var(--white);
  font-size: var(--text-sm);
  transition: all var(--transition-fast);
  box-shadow: var(--shadow-xs);
}
.search-box input:focus {
  outline: none;
  border-color: var(--orange-400);
  box-shadow: var(--shadow-orange-glow);
}

/* Profile Mini Card */
.profile-mini {
  background: var(--white);
  padding: 8px 18px 8px 12px;
  border-radius: 60px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-100);
  transition: all var(--transition-fast);
}
.profile-mini:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
  border-color: var(--orange-200);
}
.profile-mini img {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--orange-100);
}
.profile-mini strong {
  font-size: var(--text-sm);
  color: var(--gray-800);
}
.profile-mini small {
  font-size: var(--text-xs);
  color: var(--gray-500);
}

/* ---------- STATS CARDS (Professional Metrics) ---------- */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
  margin-bottom: 40px;
}

.stat-card {
  background: var(--white);
  padding: 24px;
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-100);
  transition: all var(--transition-base);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--orange-500), var(--orange-300));
  opacity: 0;
  transition: opacity var(--transition-fast);
}
.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--orange-200);
}
.stat-card:hover::before {
  opacity: 1;
}

.stat-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.stat-card p {
  color: var(--orange-600);
  font-size: var(--text-sm);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-card h3 {
  font-size: var(--text-3xl);
  font-weight: 800;
  margin-top: 12px;
  color: var(--gray-900);
}
.stat-icon {
  width: 52px;
  height: 52px;
  border-radius: var(--radius-md);
  background: var(--orange-50);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--orange-600);
  font-size: 24px;
  transition: transform var(--transition-fast);
}
.stat-card:hover .stat-icon {
  transform: scale(1.05);
  background: var(--orange-100);
}

/* ---------- CARDS (Form & Content) ---------- */
.card {
  background: var(--white);
  border-radius: var(--radius-xl);
  padding: 32px;
  margin-bottom: 32px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-100);
  transition: all var(--transition-base);
}
.card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--gray-200);
}

.card-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 16px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--gray-100);
}
.card-title h2 {
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--gray-800);
}

/* ---------- FORM ELEMENTS (Clean Inputs) ---------- */
.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}
.full {
  grid-column: 1 / -1;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
label {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--gray-700);
  letter-spacing: -0.2px;
}
input, textarea, select {
  width: 100%;
  border: 1px solid var(--gray-200);
  padding: 12px 16px;
  border-radius: var(--radius-md);
  outline: none;
  font-size: var(--text-sm);
  transition: all var(--transition-fast);
  background: var(--white);
  color: var(--gray-800);
}
input:focus, textarea:focus, select:focus {
  border-color: var(--orange-400);
  box-shadow: var(--shadow-orange-glow);
}
textarea {
  min-height: 110px;
  resize: vertical;
  font-family: inherit;
}
input[type="file"] {
  padding: 10px;
  background: var(--gray-50);
  border-radius: var(--radius-md);
}
input[type="file"]::file-selector-button {
  padding: 8px 18px;
  border-radius: 40px;
  border: none;
  background: var(--orange-100);
  color: var(--orange-700);
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}
input[type="file"]::file-selector-button:hover {
  background: var(--orange-200);
}

/* ---------- BUTTONS (Orange Primary, Gray Secondary) ---------- */
.btn {
  border: none;
  padding: 12px 24px;
  border-radius: 48px;
  font-weight: 600;
  font-size: var(--text-sm);
  transition: all var(--transition-fast);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.btn-primary {
  background: var(--orange-500);
  color: white;
  box-shadow: 0 2px 6px rgba(249,115,22,0.2);
}
.btn-primary:hover {
  background: var(--orange-600);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(234,88,12,0.2);
}
.btn-secondary {
  background: var(--gray-100);
  color: var(--gray-700);
  border: 1px solid var(--gray-200);
}
.btn-secondary:hover {
  background: var(--gray-200);
  transform: translateY(-1px);
}
.btn-danger {
  background: #fef2f2;
  color: #dc2626;
}
.btn-danger:hover {
  background: #fee2e2;
  transform: translateY(-1px);
}

/* ---------- PRODUCT GRID (Modern Cards) ---------- */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 28px;
}
.product-card {
  background: var(--white);
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: all var(--transition-base);
  border: 1px solid var(--gray-100);
}
.product-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-xl);
  border-color: var(--orange-200);
}
.product-card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
  cursor: pointer;
  transition: transform var(--transition-slow);
}
.product-card:hover img {
  transform: scale(1.02);
}
.product-body {
  padding: 24px;
}
.category {
  display: inline-block;
  background: var(--orange-50);
  color: var(--orange-700);
  padding: 5px 14px;
  border-radius: 40px;
  font-size: var(--text-xs);
  font-weight: 700;
  margin-bottom: 16px;
}
.product-body h3 {
  font-size: var(--text-xl);
  margin-bottom: 12px;
  font-weight: 700;
  color: var(--gray-800);
}
.price {
  font-size: var(--text-2xl);
  font-weight: 800;
  color: var(--orange-600);
  margin-bottom: 16px;
}
.meta {
  display: flex;
  flex-direction: column;
  gap: 10px;
  color: var(--gray-500);
  font-size: var(--text-sm);
  margin-bottom: 20px;
}
.meta i {
  width: 20px;
  margin-right: 8px;
  color: var(--gray-400);
}
.product-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.product-actions .btn {
  flex: 1;
}

/* Profile Upload Section */
.profile-upload {
  display: flex;
  align-items: center;
  gap: 28px;
  flex-wrap: wrap;
  margin-bottom: 32px;
  padding: 20px;
  background: var(--gray-50);
  border-radius: var(--radius-lg);
}
.profile-upload img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid white;
  box-shadow: var(--shadow-md);
}

.product-image-preview {
  width: 100%;
  height: 320px;
  object-fit: cover;
  border-radius: var(--radius-lg);
  margin-bottom: 28px;
  background: var(--gray-100);
  cursor: pointer;
  transition: opacity var(--transition-fast);
}
.product-image-preview:hover {
  opacity: 0.9;
}

/* Empty State */
.empty {
  background: var(--white);
  padding: 64px 48px;
  border-radius: var(--radius-xl);
  text-align: center;
  color: var(--gray-500);
  border: 1px dashed var(--gray-300);
}
.empty i {
  font-size: 64px;
  margin-bottom: 20px;
  color: var(--orange-400);
}
.empty h2 {
  font-size: var(--text-xl);
  margin-bottom: 8px;
  color: var(--gray-600);
}

/* Loader */
.loader {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 99999;
}
.spinner {
  width: 52px;
  height: 52px;
  border: 3px solid var(--gray-200);
  border-top: 3px solid var(--orange-500);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Image Modal */
.image-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999999;
  padding: 24px;
}
.image-modal.active { display: flex; }
.image-modal img {
  max-width: 90%;
  max-height: 85vh;
  border-radius: var(--radius-lg);
  object-fit: contain;
  box-shadow: var(--shadow-xl);
}
.close-modal {
  position: absolute;
  top: 24px;
  right: 28px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: white;
  border: none;
  font-size: 20px;
  cursor: pointer;
  transition: 0.2s;
}
.close-modal:hover {
  background: var(--orange-500);
  color: white;
  transform: scale(1.05);
}

/* ---------- MOBILE MENU BUTTON ---------- */
.mobile-menu-btn {
  display: none;
  position: fixed;
  top: 20px;
  left: 20px;
  width: 48px;
  height: 48px;
  border-radius: 28px;
  background: var(--orange-500);
  color: white;
  border: none;
  font-size: 20px;
  z-index: 1100;
  cursor: pointer;
  box-shadow: var(--shadow-md);
}

/* ---------- RESPONSIVE DESIGN (Mobile First adjustments) ---------- */
@media (max-width: 950px) {
  .mobile-menu-btn {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sidebar {
    transform: translateX(-100%);
    width: var(--sidebar-width-mobile);
    box-shadow: var(--shadow-xl);
  }
  .sidebar.active {
    transform: translateX(0);
  }
  .main {
    margin-left: 0;
    width: 100%;
    padding: 24px 20px;
    padding-top: 88px;
  }
  .topbar {
    flex-direction: column;
    align-items: stretch;
  }
  .profile-mini {
    align-self: flex-start;
  }
  .search-box {
    width: 100%;
  }
}

@media (max-width: 768px) {
  .main {
    padding: 20px;
    padding-top: 88px;
  }
  .stats-grid {
    gap: 16px;
  }
  .form-grid {
    grid-template-columns: 1fr;
    gap: 20px;
  }
  .products-grid {
    gap: 20px;
    grid-template-columns: 1fr;
  }
  .card {
    padding: 24px;
  }
  .stat-card h3 {
    font-size: var(--text-2xl);
  }
}

@media (max-width: 640px) {
  .main {
    padding: 16px;
    padding-top: 84px;
  }
  .stat-card {
    padding: 20px;
  }
  .stat-icon {
    width: 44px;
    height: 44px;
    font-size: 20px;
  }
  .product-card img {
    height: 200px;
  }
  .product-body {
    padding: 18px;
  }
  .price {
    font-size: var(--text-xl);
  }
  .btn {
    padding: 10px 20px;
  }
  .profile-upload {
    flex-direction: column;
    text-align: center;
  }
  .product-image-preview {
    height: 220px;
  }
  .empty {
    padding: 40px 24px;
  }
}

@media (max-width: 480px) {
  .card-title {
    flex-direction: column;
    align-items: flex-start;
  }
  .product-actions {
    flex-direction: column;
  }
  .product-actions .btn {
    width: 100%;
  }
  .welcome h1 {
    font-size: var(--text-2xl);
  }
}

/* ---------- DARK MODE SUPPORT (Optional but polished) ---------- */
@media (prefers-color-scheme: dark) {
  body {
    background: #0a0c10;
  }

}
</style>

id="productsGrid"></div>

<script>

/* =========================================================
   PROFESSIONAL MARKETPLACE DASHBOARD
   FULL UPGRADE VERSION
   KEEPING SAME UI / DESIGN
========================================================= */

/* =========================================================
   CONFIG
========================================================= */

const API_URL =
"https://v2-dashibord-server-11cln.onrender.com/api";

const DEFAULT_PRODUCT_IMAGE =
"https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200&auto=format&fit=crop";

const token =
localStorage.getItem("token");

if (!token) {
  window.location.href = "/login.html";
}

/* =========================================================
   HELPERS
========================================================= */

const $ = id =>
document.getElementById(id);

const elements = {
  loader: $("loader"),
  sidebar: $("sidebar"),
  productsGrid: $("productsGrid"),
  imageModal: $("imageModal"),
  modalImage: $("modalImage")
};

const navLinks =
document.querySelectorAll(".nav-link");

const sections =
document.querySelectorAll(".section");

/* =========================================================
   GLOBAL STATE
========================================================= */

let products = [];
let profile = {};
let editingProductId = null;

/* =========================================================
   API CLIENT
========================================================= */

async function api(
  endpoint,
  options = {}
){

  try {

    const response = await fetch(
      `${API_URL}${endpoint}`,
      {
        ...options,

        headers: {
          Authorization:
          `Bearer ${token}`,

          ...(options.body &&
          !(options.body instanceof FormData)
            ? {
                "Content-Type":
                "application/json"
              }
            : {}),

          ...(options.headers || {})
        }
      }
    );

    const data =
    await response.json();

    if (!response.ok) {
      throw new Error(
        data.message ||
        "Request failed"
      );
    }

    return data;

  } catch (error) {

    console.error(error);

    throw error;
  }
}

/* =========================================================
   UI UTILITIES
========================================================= */

function showLoader() {
  elements.loader.style.display = "flex";
}

function hideLoader() {
  elements.loader.style.display = "none";
}

function showToast(message) {
  alert(message);
}

function openImage(src) {

  elements.modalImage.src = src;

  elements.imageModal
  .classList.add("active");
}

function closeImage() {

  elements.imageModal
  .classList.remove("active");
}

/* =========================================================
   MOBILE MENU
========================================================= */

$("mobileMenuBtn")
.addEventListener(
  "click",
  () => {

    elements.sidebar
    .classList.toggle("active");

  }
);

/* =========================================================
   NAVIGATION
========================================================= */

navLinks.forEach(link => {

  link.addEventListener(
    "click",
    e => {

      e.preventDefault();

      navLinks.forEach(item =>
        item.classList
        .remove("active")
      );

      sections.forEach(section =>
        section.classList
        .remove("active")
      );

      link.classList.add("active");

      $(
        `${link.dataset.section}-section`
      )
      .classList.add("active");

      if (
        window.innerWidth < 950
      ) {

        elements.sidebar
        .classList.remove("active");

      }

    }
  );

});

/* =========================================================
   IMAGE MODAL
========================================================= */

$("closeModal")
.addEventListener(
  "click",
  closeImage
);

elements.imageModal
.addEventListener(
  "click",
  e => {

    if (
      e.target ===
      elements.imageModal
    ) {
      closeImage();
    }

  }
);

/* =========================================================
   IMAGE PREVIEW
========================================================= */

$("productImage")
.addEventListener(
  "change",
  previewProductImage
);

$("profileImageInput")
.addEventListener(
  "change",
  previewProfileImage
);

function previewProductImage(e) {

  const file =
  e.target.files[0];

  if (!file) return;

  const reader =
  new FileReader();

  reader.onload = event => {

    $("productPreview").src =
    event.target.result;

  };

  reader.readAsDataURL(file);
}

function previewProfileImage(e) {

  const file =
  e.target.files[0];

  if (!file) return;

  const reader =
  new FileReader();

  reader.onload = event => {

    $("profilePreview").src =
    event.target.result;

    $("miniAvatar").src =
    event.target.result;

  };

  reader.readAsDataURL(file);
}

/* =========================================================
   LOAD PROFILE
========================================================= */

async function loadProfile() {

  try {

    const data =
    await api("/profile");

    profile = data.user || data;

    $("firstName").value =
    profile.firstName || "";

    $("lastName").value =
    profile.lastName || "";

    $("phone").value =
    profile.phone || "";

    $("country").value =
    profile.country || "";

    $("location").value =
    profile.location || "";

    $("bio").value =
    profile.bio || "";

    $("miniName").innerText =
    `${profile.firstName || ""}
    ${profile.lastName || ""}`;

    if (profile.avatar) {

      $("profilePreview").src =
      profile.avatar;

      $("miniAvatar").src =
      profile.avatar;
    }

  } catch (error) {

    showToast(
      error.message
    );

  }

}

/* =========================================================
   SAVE PROFILE
========================================================= */

$("saveProfileBtn")
.addEventListener(
  "click",
  saveProfile
);

// SAVE PROFILE - FIXED VERSION
async function saveProfile() {
  try {
    showLoader();
    
    // Get all form elements and check they exist
    const firstNameEl = $("#firstName");
    const lastNameEl = $("#lastName");
    const phoneEl = $("#phone");
    const countryEl = $("#country");
    const locationEl = $("#location");
    const bioEl = $("#bio");
    const avatarFile = $("#profileImageInput").files[0];
    
    // Validate all required elements exist
    if (!firstNameEl || !lastNameEl || !phoneEl || !countryEl || !locationEl || !bioEl) {
      showToast("Form elements not found");
      return;
    }
    
    const formData = new FormData();
    formData.append('firstName', firstNameEl.value);
    formData.append('lastName', lastNameEl.value);
    formData.append('phone', phoneEl.value);
    formData.append('country', countryEl.value);
    formData.append('location', locationEl.value);
    formData.append('bio', bioEl.value);
    
    // Get avatar file if changed
    if (avatarFile) {
      formData.append('avatar', avatarFile);
    }

    const response = await fetch(`${API_URL}/profile`, {
      method: "PUT",
      headers: {
        'Authorization': `Bearer ${token}`
      },
      body: formData
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.message || "Update failed");

    // Update UI with new data
    if (data.avatar) {
      $("#profilePreview").src = data.avatar;
      $("#miniAvatar").src = data.avatar;
    }
    
    // Update mini name display
    $("#miniName").innerText = `${data.firstName || firstNameEl.value || ""} ${data.lastName || lastNameEl.value || ""}`.trim();
    
    showToast("Profile updated successfully");
  } catch (error) {
    console.error("Save profile error:", error);
    showToast(error.message);
  } finally {
    hideLoader();
  }
}

/* =========================================================
   LOAD PRODUCTS
========================================================= */

async function loadProducts() {
  try {
    showLoader();
    const data = await api("/products/my"); // Changed from "/products"
    products = data.products || data || [];
    renderProducts();
    updateStats();
  } catch (error) {
    showToast(error.message);
  } finally {
    hideLoader();
  }
}

/* =========================================================
   ADD / UPDATE PRODUCT
========================================================= */

$("addProductBtn")
.addEventListener(
  "click",
  saveProduct
);

async function saveProduct() {
  try {
    const name = $("productName").value.trim();
    const price = $("price").value.trim();
    const location = $("productLocation").value.trim();

    if (!name || !price || !location) {
      return showToast("Please fill all required fields");
    }

    showLoader();

    // Create FormData instead of JSON
    const formData = new FormData();
    formData.append('name', name);
    formData.append('category', $("productCategory").value);
    formData.append('currency', $("currency").value);
    formData.append('price', price);
    formData.append('stock', $("stock").value);
    formData.append('description', $("description").value);
    formData.append('location', location);
    
    // Add image file if selected
    const imageFile = $("productImage").files[0];
    if (imageFile) {
      formData.append('image', imageFile);
    }

    let data;

    if (editingProductId) {
      data = await api(`/products/${editingProductId}`, {
        method: "PUT",
        body: formData
      });

      products = products.map(product =>
        product._id === editingProductId ? data : product
      );

      editingProductId = null;
      $("addProductBtn").innerHTML = `<i class="fa-solid fa-plus"></i> Add Product`;
      showToast("Product updated");
    } else {
      data = await api("/products", {
        method: "POST",
        body: formData
      });

      products.unshift(data);
      showToast("Product added");
    }

    renderProducts();
    updateStats();
    resetForm();

  } catch (error) {
    showToast(error.message);
  } finally {
    hideLoader();
  }
}

/* =========================================================
   RESET FORM
========================================================= */

function resetForm() {

  editingProductId = null;

  [
    "productName",
    "price",
    "stock",
    "description",
    "productLocation",
    "productImage"
  ]
  .forEach(id => {

    $(id).value = "";

  });

  $("productPreview").src =
  DEFAULT_PRODUCT_IMAGE;

}

/* =========================================================
   RENDER PRODUCTS
========================================================= */

function renderProducts(
  items = products
){

  if (!items.length) {

    elements.productsGrid.innerHTML = `
      <div class="empty">

        <i class="fa-solid fa-box-open"
        style="
        font-size:60px;
        margin-bottom:20px;
        "></i>

        <h2>No Products Found</h2>

        <p style="margin-top:10px;">
        Add your first product now
        </p>

      </div>
    `;

    return;
  }

  elements.productsGrid.innerHTML =
  items.map(product => `

    <div class="product-card">

      <img
      src="${
        product.image ||
        DEFAULT_PRODUCT_IMAGE
      }"

      onclick="
      openImage(
      '${
        product.image ||
        DEFAULT_PRODUCT_IMAGE
      }'
      )
      ">

      <div class="product-body">

        <span class="category">
        ${product.category}
        </span>

        <h3>${product.name}</h3>

        <div class="price">

        ${product.currency}

        ${Number(
          product.price || 0
        ).toLocaleString()}

        </div>

        <div class="meta">

          <span>

          <i class="
          fa-solid
          fa-location-dot
          "></i>

          ${product.location}

          </span>

          <span>

          <i class="
          fa-solid
          fa-cubes
          "></i>

          Stock:
          ${product.stock || 0}

          </span>

        </div>

        <div class="product-actions">

          <button
          class="btn btn-secondary"
          onclick="
          editProduct(
          '${product._id}'
          )
          ">

          Edit

          </button>

          <button
          class="btn btn-danger"
          onclick="
          deleteProduct(
          '${product._id}'
          )
          ">

          Delete

          </button>

        </div>

      </div>

    </div>

  `).join("");

}

/* =========================================================
   EDIT PRODUCT
========================================================= */

function editProduct(id) {

  const product =
  products.find(
    p => p._id === id
  );

  if (!product) return;

  editingProductId = id;

  $("productName").value =
  product.name;

  $("productCategory").value =
  product.category;

  $("currency").value =
  product.currency;

  $("price").value =
  product.price;

  $("stock").value =
  product.stock;

  $("description").value =
  product.description;

  $("productLocation").value =
  product.location;

  $("productPreview").src =
  product.image ||
  DEFAULT_PRODUCT_IMAGE;

  $("addProductBtn")
  .innerHTML = `
  <i class="fa-solid fa-pen"></i>
  Update Product
  `;

  document
  .querySelector(
    '[data-section="add-product"]'
  )
  .click();

}

/* =========================================================
   DELETE PRODUCT
========================================================= */

async function deleteProduct(id) {

  if (
    !confirm(
      "Delete this product?"
    )
  ) return;

  try {

    showLoader();

    await api(
      `/products/${id}`,
      {
        method: "DELETE"
      }
    );

    products =
    products.filter(
      product =>
      product._id !== id
    );

    renderProducts();

    updateStats();

    showToast(
      "Product deleted"
    );

  } catch (error) {

    showToast(error.message);

  } finally {

    hideLoader();

  }

}

/* =========================================================
   SEARCH
========================================================= */

$("searchInput")
.addEventListener(
  "input",
  e => {

    const value =
    e.target.value
    .toLowerCase();

    const filtered =
    products.filter(product =>

      product.name
      .toLowerCase()
      .includes(value)

      ||

      product.category
      .toLowerCase()
      .includes(value)

    );

    renderProducts(filtered);

  }
);

/* =========================================================
   DASHBOARD STATS
========================================================= */

function updateStats() {

  $("totalProducts").innerText =
  products.length;

  const total =
  products.reduce(
    (sum, product) =>

      sum +
      Number(
        product.price || 0
      ),

    0
  );

  $("totalSales").innerText =
  "$" +
  total.toLocaleString();

  $("totalOrders").innerText =
  Math.floor(
    products.length * 2.3
  );

  $("visitors").innerText =
  (
    products.length * 137
  ) + "+";

}

/* =========================================================
   LOGOUT
========================================================= */

$("logoutBtn")
.addEventListener(
  "click",
  logout
);

function logout() {

  if (
    !confirm("Logout now?")
  ) return;

  localStorage.removeItem(
    "token"
  );

  window.location.href =
  "/login.html";
}

/* =========================================================
   INITIALIZE APP
========================================================= */

async function init() {

  await Promise.all([
    loadProfile(),
    loadProducts()
  ]);

}

init();
</script>
