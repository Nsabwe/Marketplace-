<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - OurMarket</title>

  <style>
    :root {
      --primary: #1e40af;
      --accent: #f97316;
      --bg: #f4f7fb;
      --card: rgba(255,255,255,0.9);
      --text: #1f2937;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 10px 25px rgba(0,0,0,0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(180deg, #f4f7fb, #eef2ff);
      color: var(--text);
    }

    .header {
      background: var(--card);
      backdrop-filter: blur(10px);
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h2 {
      margin: 0;
      font-weight: 600;
      color: var(--primary);
    }

    button {
      background: linear-gradient(135deg, var(--primary), #3b82f6);
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s ease;
      box-shadow: 0 6px 15px rgba(30,64,175,0.2);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(30,64,175,0.25);
    }

    .delete {
      background: linear-gradient(135deg, var(--accent), #fb923c);
    }

    .container {
      padding: 24px;
      max-width: 1050px;
      margin: auto;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(10px);
      padding: 18px;
      border-radius: 16px;
      margin-bottom: 22px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    input, select {
      width: 100%;
      padding: 11px 12px;
      margin: 6px 0;
      border-radius: 10px;
      border: 1px solid var(--border);
      outline: none;
      background: #fff;
      transition: 0.2s;
      font-size: 14px;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30,64,175,0.15);
    }

    .profile-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    #profilePreview {
      width: 85px;
      height: 85px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary);
      box-shadow: var(--shadow);
    }

    .image-preview {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    #productImagePreview {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 14px;
      border: 2px solid rgba(30,64,175,0.2);
      box-shadow: var(--shadow);
    }

    .product {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .product img {
      width: 85px;
      height: 85px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .product div {
      flex: 1;
      min-width: 160px;
      font-size: 14px;
    }

    b {
      color: var(--primary);
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .product {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    .online-badge {
      display: none;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: var(--shadow);
    }

    .online-badge::before {
      content: "●";
      margin-right: 6px;
      color: #22c55e;
    }

    .spinner {
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid #f97316;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    button.loading {
      pointer-events: none;
      opacity: 0.8;
    }

  </style>
</head>

<body>

<div class="header">
  <h2>Seller Dashboard</h2>
  <span id="onlineBadge" style="display:none; color:green; font-weight:600;"> ● Online Seller </span>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">
  <!-- PROFILE -->
  <div class="card">
    <h3>My Profile</h3>
    <div class="profile-wrap">
      <img id="profilePreview" src="https://via.placeholder.com/80" />
      <input type="file" id="profileImage" accept="image/*" onchange="previewProfile(event)">
    </div>
    <input id="firstName" placeholder="First Name">
    <input id="lastName" placeholder="Last Name">
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <select id="countryCode">
        <option value="+265">🇲🇼 (+265)</option>
        <option value="+1">🇺🇸 (+1)</option>
        <option value="+44">🇬🇧 (+44)</option>
        <option value="+27">🇿🇦 (+27)</option>
        <option value="+254">🇰🇪 (+254)</option>
      </select>
      <input id="phone" placeholder="Phone">
    </div>
    <input id="location" placeholder="Location">
    <button onclick="saveProfile()">Save Profile</button>
  </div>

  <!-- ADD PRODUCT -->
  <div class="card">
    <h3>Add Product</h3>
    <div class="image-preview">
      <img id="productImagePreview" src="https://via.placeholder.com/150" />
    </div>
    <input id="pname" placeholder="Product Name">
    <select id="category" required>
      <option value="">Select Category</option>
      <option value="Electronics">Electronics</option>
      <option value="Fashion">Fashion</option>
      <option value="Home">Home</option>
      <option value="Beauty">Beauty</option>
      <option value="Vehicles">Vehicles</option>
      <option value="Other">Other</option>
    </select>
    <select id="currency">
      <option value="MWK">MWK</option>
      <option value="USD">USD</option>
    </select>
    <input id="pprice" placeholder="Price" oninput="formatPrice(this)">
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <select id="countryCodeProduct">
        <option value="+265">🇲🇼 (+265)</option>
        <option value="+1">🇺🇸 (+1)</option>
        <option value="+44">🇬🇧 (+44)</option>
        <option value="+27">🇿🇦 (+27)</option>
        <option value="+254">🇰🇪 (+254)</option>
      </select>
      <input id="phoneProduct" placeholder="Phone">
    </div>
    <input id="locationProduct" placeholder="Location">
    <input type="file" id="pimage" accept="image/*" onchange="previewProductImage(event)">
    <button onclick="addProduct()">Add Product</button>
  </div>

  <!-- PRODUCTS -->
  <div class="card">
    <h3>My Products</h3>
    <div id="myProducts"></div>
  </div>
</div>

<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>

<script>
const API = "https://v2-dashibord-server-2.onrender.com/api";
const RATE = 1700;
const token = localStorage.getItem("token");

if (!token) location.href = "index.html";

let cropper = null;

const el = id => document.getElementById(id);

function authHeaders(isJSON = false) {
  const headers = { Authorization: "Bearer " + token };
  if (isJSON) headers["Content-Type"] = "application/json";
  return headers;
}

function handleAuth(res) {
  if (res.status === 401) {
    localStorage.removeItem("token");
    location.href = "index.html";
  }
  return res;
}

async function loadProfile() {
  const res = await fetch(API + "/me", { headers: authHeaders() });
  handleAuth(res);

  const user = await res.json();
  if (user.imageURL) el("profilePreview").src = user.imageURL;
  if (user.name) {
    const parts = user.name.split(" ");
    el("firstName").value = parts[0] || "";
    el("lastName").value = parts[1] || "";
  }
  if (user.phone) el("phone").value = user.phone.replace(/^\+\d+/, "");
  el("location").value = user.location || "";
  if (user.isOnline) el("onlineBadge").style.display = "inline";
}

async function saveProfile() {
  const form = new FormData();
  form.append("name", el("firstName").value + " " + el("lastName").value);
  form.append("phone", el("countryCode").value + el("phone").value);
  form.append("location", el("location").value);
  if (el("profileImage").files[0]) form.append("image", el("profileImage").files[0]);

  await fetch(API + "/me", { method: "POST", headers: authHeaders(), body: form });
  alert("Profile saved");
  loadProfile();
}

function previewProfile(e) {
  el("profilePreview").src = URL.createObjectURL(e.target.files[0]);
}

function previewProductImage(e) {
  el("productImagePreview").src = URL.createObjectURL(e.target.files[0]);
}

function formatPrice(input) {
  let value = input.value.replace(/,/g, "");
  if (!isNaN(value) && value !== "") {
    input.value = Number(value).toLocaleString();
  }
}

async function addProduct() {
  const btn = event.target;
  setLoading(btn, "Adding...");

  const pname = el("pname").value;
  const category = el("category").value;

  if (!category || !el("locationProduct").value) {
    alert("Please fill all fields");
    stopLoading(btn, "Add Product");
    return;
  }

  const rawPrice = el("pprice").value.replace(/[^\d.]/g, "");
  const price = Number(rawPrice) || 0;

  const currency = el("currency").value;

  // 👇 THIS is what backend will store (human-readable)
  const priceDisplay = `${currency} ${price.toLocaleString()}`;

  const form = new FormData();
  form.append("name", pname);
  form.append("category", category);

  // ✅ NEW SINGLE FIELD FOR BACKEND
  form.append("price", priceDisplay);

  form.append("phone", el("countryCodeProduct").value + el("phoneProduct").value);
  form.append("location", el("locationProduct").value);

  if (el("pimage").files[0]) form.append("image", el("pimage").files[0]);

  const res = await fetch(API + "/products", {
    method: "POST",
    headers: authHeaders(),
    body: form
  });

  handleAuth(res);
  stopLoading(btn, "Add Product");
  loadProducts();
}

async function loadProducts() {
  const res = await fetch(API + "/my-products", { headers: authHeaders() });
  handleAuth(res);

  const data = await res.json();
  const myProducts = el("myProducts");
  myProducts.innerHTML = "";

  data.forEach(p => {
    myProducts.innerHTML += `
      <div class="product">
        <img src="${p.imageURL}" onclick="openImage('${p.imageURL}')">
        <div><b>${p.name}</b><br>${p.category || ""}<br>MWK ${Number(p.priceMWK).toLocaleString()} / $${p.priceUSD}</div>
        <button class="delete" onclick="deleteProduct('${p._id}')">Delete</button>
      </div>
    `;
  });
}

async function deleteProduct(id) {
  await fetch(API + "/products/" + id, { method: "DELETE", headers: authHeaders() });
  loadProducts();
}

function logout() {
  localStorage.removeItem("token");
  location.href = "index.html";
}

function setLoading(btn, text) {
  btn.classList.add("loading");
  btn.innerHTML = `<span class="spinner"></span> ${text}`;
}

function stopLoading(btn, text) {
  btn.classList.remove("loading");
  btn.innerHTML = text;
}

loadProfile();
loadProducts();
</script>
</body>
</html>
